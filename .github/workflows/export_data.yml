name: Export Dashboard Data

on:
  workflow_run:
    workflows: ["Daily ServiceTitan Report", "Weekly Membership Report"]
    types: [completed]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export data to JSON
        env:
          GOOGLE_SA_JSON_CONTENT: ${{ secrets.GOOGLE_SA_JSON }}
          GOOGLE_SHEET_ID:        ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB:       ${{ secrets.GOOGLE_SHEET_TAB }}
          MEMBERSHIP_SHEET_ID:    ${{ secrets.MEMBERSHIP_SHEET_ID }}
        run: python export_to_json.py

      - name: Commit and push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
