name: Weekly Membership Report

on:
  schedule:
    - cron: '0 12 * * 0'   # Every Sunday at 7am EST (12:00 UTC)
  workflow_dispatch:         # Manual trigger anytime from GitHub UI

jobs:
  run-membership-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account JSON
        env:
          SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          printf '%s' "$SA_JSON" > service_account.json
          size=$(stat -c%s service_account.json)
          echo "service_account.json size: $size bytes"
          if [ "$size" -lt 100 ]; then
            echo "ERROR: GOOGLE_SA_JSON secret is empty or too short."
            exit 1
          fi

      - name: Run membership report
        env:
          ST_TENANT_ID:       ${{ secrets.ST_TENANT_ID }}
          ST_CLIENT_ID:       ${{ secrets.ST_CLIENT_ID }}
          ST_CLIENT_SECRET:   ${{ secrets.ST_CLIENT_SECRET }}
          ST_APP_KEY:         ${{ secrets.ST_APP_KEY }}
          GOOGLE_SA_JSON:     service_account.json
          MEMBERSHIP_SHEET_ID: ${{ secrets.MEMBERSHIP_SHEET_ID }}
        run: python memberships.py
