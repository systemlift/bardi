name: Daily ServiceTitan Report

on:
  schedule:
    - cron: '0 11 * * *'   # Runs daily at 6am EST (11:00 UTC)
  workflow_dispatch:         # Allows manual trigger from GitHub UI anytime

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account JSON
        env:
          SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          printf '%s' "$SA_JSON" > service_account.json
          size=$(stat -c%s service_account.json)
          echo "service_account.json size: $size bytes"
          if [ "$size" -lt 100 ]; then
            echo "ERROR: GOOGLE_SA_JSON secret is empty or too short."
            echo "  Expected: the full contents of your service_account.json file (typically >2000 bytes)."
            exit 1
          fi

      - name: Run report
        env:
          ST_TENANT_ID:     ${{ secrets.ST_TENANT_ID }}
          ST_CLIENT_ID:     ${{ secrets.ST_CLIENT_ID }}
          ST_CLIENT_SECRET: ${{ secrets.ST_CLIENT_SECRET }}
          ST_APP_KEY:       ${{ secrets.ST_APP_KEY }}
          GOOGLE_SA_JSON:   service_account.json
          GOOGLE_SHEET_ID:  ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: ${{ secrets.GOOGLE_SHEET_TAB }}
        run: python run.py
