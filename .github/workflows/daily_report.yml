name: Daily ServiceTitan Report

on:
  schedule:
    - cron: '0 11 * * *'   # Runs daily at 6am EST (11:00 UTC)
  workflow_dispatch:         # Allows manual trigger from GitHub UI anytime

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account JSON
        run: echo '${{ secrets.GOOGLE_SA_JSON_CONTENT }}' > service_account.json

      - name: Run report
        env:
          ST_TENANT_ID:     ${{ secrets.ST_TENANT_ID }}
          ST_CLIENT_ID:     ${{ secrets.ST_CLIENT_ID }}
          ST_CLIENT_SECRET: ${{ secrets.ST_CLIENT_SECRET }}
          ST_APP_KEY:       ${{ secrets.ST_APP_KEY }}
          GOOGLE_SA_JSON:   service_account.json
          GOOGLE_SHEET_ID:  ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: ${{ secrets.GOOGLE_SHEET_TAB }}
        run: python run.py
